<daffio-doc-viewer [breadcrumbs]="doc().breadcrumbs" [toc]="toc()">
	@for (component of fragments()?.components || []; track $index; let i = $index) {
		<ng-template [ngComponentOutlet]="component" [ngComponentOutletInputs]="{doc: doc(), toc: fragmentTocs()[i]}"></ng-template>
	}
</daffio-doc-viewer>
