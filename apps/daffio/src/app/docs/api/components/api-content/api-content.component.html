<daffio-doc-viewer [breadcrumbs]="doc().breadcrumbs" [toc]="doc().tableOfContents || []">
	@if (isApiPackage()) {
		<daffio-api-package [doc]="doc()"></daffio-api-package>
	} @else {
		<ng-template [ngComponentOutlet]="component()" [ngComponentOutletInputs]="{doc: doc()}"></ng-template>
	}
</daffio-doc-viewer>
