@if (doc().methods.length > 0) {
	@if (child()) {
		<h4 daffioDocsTocHeader id="{{doc().slug}}-methods" content="Methods" level="4" class="daffio-docs-api-methods-fragment__heading"><span class="daffio-docs-api-methods-fragment__method-icon">()</span> Methods</h4>
	} @else {
		<h2 daffioDocsTocHeader id="methods" content="Methods" level="2" class="daffio-docs-api-methods-fragment__heading"><span class="daffio-docs-api-methods-fragment__method-icon">()</span> Methods</h2>
	}
	<div class="daffio-docs-api-methods-fragment__member-grid">
		@for (method of doc().methods; track $index) {
			<daffio-docs-api-method-block [method]="method" [child]="child()"></daffio-docs-api-method-block>
		}
	</div>
}
