<daff-form-field>
  <daff-form-label>Email</daff-form-label>
  <input daff-input type="text" name="email" [formControl]="control"/>
  <daff-hint>Hint</daff-hint>
  @if (control.errors?.required) {
    <daff-error-message>Email is a required field.</daff-error-message>
  }
  @if (control.errors?.email) {
    <daff-error-message>Email is not valid.</daff-error-message>
  }
</daff-form-field>
<p>Value: {{ control.value }} </p>
