<ng-content select="label[daffProgressBarLabel]"></ng-content>
<div class="daff-progress-bar__track">
	@if (indeterminate) {
		<div class="daff-progress-bar__fill indeterminate-bar"></div>
	} @else {
		<div class="daff-progress-bar__fill determinate-bar" [style.transform]="_determinateBarTransform()"
		(transitionend)="onTransitionEnd($event)"></div>
	}
</div>
