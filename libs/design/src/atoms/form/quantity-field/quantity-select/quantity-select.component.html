<select daff-native-select
  [formControl]="ngControl.control"
  (focus)="onFocus()"
>
  <option *ngFor="let item of valueArray" [value]="item">{{ item }}</option>
  @if (extendable) {
    <option [value]="max">{{ max }}+</option>
  } @else {
    <option [value]="max">{{ max }}</option>
  }
</select>
